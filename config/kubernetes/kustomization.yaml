namePrefix: kubernetes-image-puller-operator-

resources:
  - ../default
  - ../certmanager

patches:
  - path: patches/cainjection_in_kubernetesimagepullers.yaml
  - path: patches/cainjection_in_webhook.yaml

replacements:
- source:
    kind: Certificate
    group: cert-manager.io
    version: v1
    name: kubernetes-image-puller-operator-serving-cert
    fieldPath: metadata.namespace
  targets:
  - select:
      kind: CustomResourceDefinition
    fieldPaths:
    - metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: /
      index: 0
  - select:
      kind: ValidatingWebhookConfiguration
    fieldPaths:
    - metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: /
      index: 0
- source:
    kind: Certificate
    group: cert-manager.io
    version: v1
    name: kubernetes-image-puller-operator-serving-cert
    fieldPath: metadata.name
  targets:
  - select:
      kind: CustomResourceDefinition
    fieldPaths:
    - metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: /
      index: 1
  - select:
      kind: ValidatingWebhookConfiguration
    fieldPaths:
    - metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: /
      index: 1
- source:
    kind: Service
    version: v1
    name: kubernetes-image-puller-operator-manager-service
    fieldPath: metadata.name
  targets:
  - select:
      kind: Certificate
      group: cert-manager.io
    fieldPaths:
    - spec.dnsNames.0
    - spec.dnsNames.1
    options:
      delimiter: .
      index: 0
- source:
    kind: Service
    version: v1
    name: kubernetes-image-puller-operator-manager-service
    fieldPath: metadata.namespace
  targets:
  - select:
      kind: Certificate
      group: cert-manager.io
    fieldPaths:
    - spec.dnsNames.0
    - spec.dnsNames.1
    options:
      delimiter: .
      index: 1
