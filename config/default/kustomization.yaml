namespace: kubernetes-image-puller-operator

resources:
- ../crd
- ../rbac
- ../manager
- ../webhook

patches:
- path: manager_auth_proxy_patch.yaml
- path: manager_webhook_patch.yaml

replacements:
- source:
    kind: ServiceAccount
    version: v1
    name: sa
    fieldPath: metadata.name
  targets:
  - select:
      kind: Deployment
      group: apps
    fieldPaths:
    - spec.template.spec.serviceAccountName
