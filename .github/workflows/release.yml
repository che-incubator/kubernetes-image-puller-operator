name: Release Kubernetes Image Puller operator
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'The version that is going to be released. Should be in format 1.yy.z'
        required: true
      imagePullerImage:
        description: 'The kubernetes-image-puller image to use (e.g. quay.io/eclipse/kubernetes-image-puller:1.0.0)'
        required: true
      forceRecreateTags:
        description: If true, tags will be recreated. Use with caution
        required: false
        default: 'false'
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
      - name: Validate inputs
        env:
          RELEASE_VERSION: ${{ github.event.inputs.version }}
          IMAGE_PULLER_IMAGE: ${{ github.event.inputs.imagePullerImage }}
        run: |
          if [[ ! "${RELEASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: ${RELEASE_VERSION}"
            exit 1
          fi
          if [[ ! "${IMAGE_PULLER_IMAGE}" =~ ^quay\.io/eclipse/kubernetes-image-puller:[a-zA-Z0-9._-]+$ ]]; then
            echo "::error::Image must match quay.io/eclipse/kubernetes-image-puller:<tag>"
            exit 1
          fi
      - name: Check existing tags
        env:
          RECREATE_TAGS: ${{ github.event.inputs.forceRecreateTags }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set +e
          EXISTING_TAG=$(git ls-remote --exit-code origin refs/tags/"${VERSION}")
          if [[ -n ${EXISTING_TAG} ]]; then
            if [[ ${RECREATE_TAGS} == "true" ]]; then
              echo "[INFO] Removing tag for ${VERSION} version. New tag will be recreated during release."
              git push origin :$VERSION
            else
              echo "[ERROR] Cannot proceed with release - tag ${EXISTING_TAG} already exists."
              exit 1
            fi
          else
            echo "[INFO] No existing tags detected for $VERSION"
          fi
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Docker quay.io Login
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - name: Set up Python 3.9
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: 3.9
      - name: Install yq
        run: |
          python -m pip install --upgrade pip
          pip install yq
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26'
      - name: Release operator
        env:
          RELEASE_VERSION: ${{ github.event.inputs.version }}
          FORCE_RECREATE_TAGS: ${{ github.event.inputs.forceRecreateTags }}
          IMAGE_PULLER_IMAGE: ${{ github.event.inputs.imagePullerImage }}
          GITHUB_TOKEN: ${{ secrets.CHE_INCUBATOR_BOT_GITHUB_TOKEN }}
        run: |
          echo "RELEASE_VERSION=${RELEASE_VERSION}"
          BRANCH=${RELEASE_VERSION%.*}.x
          echo "BRANCH=${BRANCH}"
          git config --global user.name "Anatolii Bazko"
          git config --global user.email "abazko@redhat.com"

          set -e

          if [[ "${FORCE_RECREATE_TAGS}" == "true" ]]; then force_update="--force"; fi
          ./make-release.sh "${RELEASE_VERSION}" ${force_update} \
            --image-puller-image "${IMAGE_PULLER_IMAGE}" \
            --release \
            --release-olm-files \
            --release-olm-bundle \
            --push-git-changes \
            --pull-requests
