name: build-next

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    -
      name: "Set up QEMU"
      uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
    -
      name: "Set up Docker Buildx"
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
    -
      name: "Docker quay.io Login"
      uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
      with:
        registry: quay.io
        username: ${{ secrets.QUAY_USERNAME }}
        password: ${{ secrets.QUAY_PASSWORD }}
    -
      name: Clone source code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        fetch-depth: 0
        persist-credentials: false
    -
      name: Prepare
      id: prep
      run: |
        set -e
        SHORT_SHA1=$(git rev-parse --short HEAD)
        echo "short_sha1=${SHORT_SHA1}" >> $GITHUB_OUTPUT
        echo "version=next" >> $GITHUB_OUTPUT
        IMAGE=kubernetes-image-puller-operator
        echo "image=${IMAGE}" >> $GITHUB_OUTPUT
    -
      name: "Build and push"
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
      with:
        context: .
        file: ./build/Dockerfile
        tags:  quay.io/eclipse/${{ steps.prep.outputs.image }}:${{ steps.prep.outputs.version }},quay.io/eclipse/${{ steps.prep.outputs.image }}:${{ steps.prep.outputs.short_sha1 }}
        push: true
